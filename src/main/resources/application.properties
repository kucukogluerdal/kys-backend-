spring.application.name=kys-backend
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kys_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kys_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kys123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://kys-frontend-sigma.vercel.app,https://kysplatform.com,https://www.kysplatform.com}

# Dosya yükleme limiti
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Süreç kodu segment → seviye tanımları (yeni segment eklemek için buraya yazın)
# Örnek: AS=L1, SR=L2, PR=L3
process.levels=AS:L1,SR:L2
